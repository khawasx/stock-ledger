services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_ledger
    ports:
      - "5432:5432"
    volumes:
      - stock_ledger_data:/var/lib/postgresql/data

volumes:
  stock_ledger_data:
